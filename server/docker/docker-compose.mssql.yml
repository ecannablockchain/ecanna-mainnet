# Local SQL Server for ECNASCAN API + indexer (bind localhost only).
# Usage (from server/docker/):
#   cp .env.mssql.example .env.mssql   # set MSSQL_SA_PASSWORD
#   docker compose -f docker-compose.mssql.yml --env-file .env.mssql up -d
services:
  ecna-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecna-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - ecna-mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  ecna-mssql-data:
