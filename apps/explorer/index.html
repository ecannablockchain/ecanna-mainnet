<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ecnascan-theme");
          if (t === "dim" || t === "dark" || t === "light") document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECNASCAN Explorer — ECNA</title>
    <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #ecnascan-boot-shell {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        box-sizing: border-box;
        background: #f8f9fa;
      }
      html[data-theme="dark"] #ecnascan-boot-shell,
      html[data-theme="dim"] #ecnascan-boot-shell {
        background: #0b1220;
      }
      /* Logo (Tailwind w-5 = 1.25rem) + rotating ring — matches in-app BrandedLoader */
      #ecnascan-boot-mark {
        position: relative;
        width: 4.5rem;
        height: 4.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #ecnascan-boot-mark::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(6, 182, 212, 0.2);
        border-top-color: #22d3ee;
        animation: ecnascan-boot-spin 0.85s linear infinite;
      }
      #ecnascan-boot-mark img {
        position: relative;
        z-index: 1;
        width: 1.25rem;
        height: 1.25rem;
        object-fit: contain;
        flex-shrink: 0;
      }
      @keyframes ecnascan-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">

    </div>
    <noscript>
      <p style="padding: 1rem">Enable JavaScript to use this explorer.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
