# ECNA Chain — Geth Clique (PoA), chain ID 4111, ~3s blocks (see genesis clique.period).
# Set ECNA_PRIMARY_ADDRESS in .env (see .env.example). genesis extraData signer + miner-private.hex must match.
# Host JSON-RPC / WS on 8545 / 8546 (same as Hardhat / Anvil defaults). Run only one L1 client on these ports.

services:
  ecna-validator-1:
    image: ethereum/client-go:v1.13.15
    container_name: ecna-validator-1
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # RPC/WS localhost only — public HTTPS goes through rpc-public-guard + nginx
      - "127.0.0.1:8545:8545"
      - "127.0.0.1:8546:8546"
      - "30303:30303"
      - "30303:30303/udp"
    volumes:
      - ./genesis.json:/genesis.json:ro
      - ./data/validator1:/data
      - ./docker/geth-entrypoint.sh:/entrypoint.sh:ro
      - ./docker/password-dev.txt:/secrets/password.txt:ro
      # Key for ECNA_PRIMARY_ADDRESS (validator); gas/etherbase = ECNA_PRIMARY, premine = ECNA_NATIVE_MINT in genesis
      - ./docker/miner-private.hex:/secrets/miner-private.hex:ro
    environment:
      GENESIS_PATH: /genesis.json
      GETH_DATADIR: /data
      NETWORK_ID: "4111"
      HTTP_PORT: "8545"
      WS_PORT: "8546"
      P2P_PORT: "30303"
      # Clique requires etherbase = unlocked signer account (keystore). Drain prevented by localhost RPC + rpc-public-guard.
      MINER_ETHERBASE: ${ECNA_PRIMARY_ADDRESS}
      UNLOCK_ACCOUNT: ${ECNA_PRIMARY_ADDRESS}
      PASSWORD_FILE: /secrets/password.txt
      HTTP_API: eth,net,web3,txpool
      HTTP_VHOSTS: localhost,127.0.0.1

    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: []

  # Second signer: import key for 0x7099... and set UNLOCK / MINER_ETHERBASE to match.
  # Uncomment after copying a fresh datadir init or use same genesis + nodekey/bootnodes.
  # ecna-validator-2:
  #   image: ethereum/client-go:v1.13.15
  #   ...
  #   environment:
  #     BOOTNODES: "enode://...@ecna-validator-1:30303"
  #     MINER_ETHERBASE: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
  #     UNLOCK_ACCOUNT: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
