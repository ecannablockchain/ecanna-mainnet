# Sync-only full node (no Clique signing). Use with validator stack: set ECNA_BOOTNODES to v1 enode.
# Run: docker compose -f docker-compose.yml -f docker-compose.fullnode.yml up -d
# Or standalone: docker compose -f docker-compose.fullnode.yml --env-file .env.fullnode up -d

services:
  ecna-fullnode:
    image: ethereum/client-go:v1.13.15
    container_name: ecna-fullnode
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "8546:8546"
      - "40303:30303"
      - "40303:30303/udp"
    volumes:
      - ./genesis.json:/genesis.json:ro
      - ./data/fullnode:/data
      - ./docker/geth-entrypoint.sh:/entrypoint.sh:ro
    environment:
      GENESIS_PATH: /genesis.json
      GETH_DATADIR: /data
      NETWORK_ID: "4111"
      HTTP_PORT: "8545"
      WS_PORT: "8546"
      P2P_PORT: "30303"
      ENABLE_MINING: "0"
      BOOTNODES: "${ECNA_BOOTNODES:-}"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: []
